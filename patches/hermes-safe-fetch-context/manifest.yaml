# Machine-readable manifest for the hermes-safe-fetch-context patch stack.
name: hermes-safe-fetch-context
series: patches/hermes-safe-fetch-context/series
verification_script: scripts/verify-hermes-safe-fetch-context-stack.sh
required_phases:
  - name: context_promotion_scanning_and_fencing
    patch: 0001-context-safety-core.patch
    mandatory: true
  - name: safe_fetch_remote_byte_ingress
    patch: 0002-safe-http-gateway-download-hardening.patch
    mandatory: true
  - name: patch_stack_integrity_tooling
    patch: 0003-customization-maintenance-tool.patch
    mandatory: true
  - name: artifact_quarantine_provenance_and_taint
    patch: 0004-provenance-action-authority-hardening.patch
    mandatory: true
  - name: action_authority_regression_tests
    patch: 0004-provenance-action-authority-hardening.patch
    mandatory: true
  - name: registry_action_classification
    patch: 0005-tool-result-promotion-action-registry.patch
    mandatory: true
  - name: tool_result_promotion_policy
    patch: 0005-tool-result-promotion-action-registry.patch
    mandatory: true

patches:
  - file: 0001-context-safety-core.patch
    owns:
      - agent/context_references.py
      - agent/context_safety.py
      - agent/memory_manager.py
      - agent/prompt_builder.py
      - cron/scheduler.py
      - tools/cronjob_tools.py
      - tools/skills_tool.py
      - tests/agent/test_context_safety.py
      - tests/agent/test_memory_provider.py
      - tests/agent/test_prompt_builder.py
      - tests/cron/test_cron_context_from.py
      - tests/cron/test_cron_script.py
      - tests/security/test_context_promotion_boundaries.py
      - tests/tools/test_cronjob_tools.py
      - tests/tools/test_skills_tool.py
    surfaces:
      - context_safety_core
      - prompt_context_file_ingestion
      - memory_provider_context
      - cron_prompt_validation
      - cron_output_context_rendering
      - skill_view_context_findings
      - context_promotion_boundaries
    required_tests:
      - tests/agent/test_context_safety.py
      - tests/agent/test_memory_provider.py
      - tests/agent/test_prompt_builder.py
      - tests/cron/test_cron_context_from.py
      - tests/cron/test_cron_script.py
      - tests/security/test_context_promotion_boundaries.py
      - tests/tools/test_cronjob_tools.py
      - tests/tools/test_skills_tool.py

  - file: 0002-safe-http-gateway-download-hardening.patch
    owns:
      - tools/safe_http.py
      - gateway/platforms/base.py
      - gateway/platforms/bluebubbles.py
      - gateway/platforms/discord.py
      - gateway/platforms/feishu.py
      - gateway/platforms/mattermost.py
      - gateway/platforms/qqbot/adapter.py
      - gateway/platforms/slack.py
      - gateway/platforms/telegram.py
      - gateway/platforms/wecom.py
      - tools/skills_hub.py
      - tests/tools/test_safe_http.py
      - tests/gateway/test_base_media_cache_safe_http.py
      - tests/gateway/test_discord_attachment_download.py
      - tests/gateway/test_feishu.py
      - tests/gateway/test_mattermost.py
      - tests/gateway/test_media_download_retry.py
      - tests/gateway/test_qqbot.py
      - tests/gateway/test_slack.py
      - tests/gateway/test_telegram_safe_image_download.py
      - tests/gateway/test_wecom.py
      - tests/security/test_safe_fetch_surfaces.py
      - tests/security/test_skill_plugin_boundaries.py
    surfaces:
      - safe_http_core
      - base_gateway_media_cache
      - bluebubbles_media_downloads
      - discord_attachment_downloads
      - feishu_media_downloads
      - mattermost_file_downloads
      - qqbot_media_and_stt_downloads
      - slack_file_downloads
      - telegram_fallback_image_downloads
      - wecom_media_downloads
      - skill_hub_remote_fetches
    required_tests:
      - tests/tools/test_safe_http.py
      - tests/gateway/test_base_media_cache_safe_http.py
      - tests/gateway/test_discord_attachment_download.py
      - tests/gateway/test_feishu.py
      - tests/gateway/test_mattermost.py
      - tests/gateway/test_media_download_retry.py
      - tests/gateway/test_qqbot.py
      - tests/gateway/test_slack.py
      - tests/gateway/test_telegram_safe_image_download.py
      - tests/gateway/test_wecom.py
      - tests/security/test_safe_fetch_surfaces.py
      - tests/security/test_skill_plugin_boundaries.py

  - file: 0003-customization-maintenance-tool.patch
    owns:
      - tools/customization_tool.py
      - tests/tools/test_customization_tool.py
      - toolsets.py
    surfaces:
      - hermes_customizations_tool
      - patch_stack_repo_status
      - patch_stack_series_audit
      - patch_stack_pii_secret_audit
    required_tests:
      - tests/tools/test_customization_tool.py

  - file: 0004-provenance-action-authority-hardening.patch
    owns:
      - agent/action_authority.py
      - agent/artifact_provenance.py
      - model_tools.py
      - run_agent.py
      - HARDENING_SURFACE_INVENTORY.md
      - tests/security/test_action_authority.py
      - tests/security/test_artifact_provenance.py
      - tests/security/test_prompt_injection_containment.py
    surfaces:
      - artifact_provenance
      - action_authority_gate
      - prompt_injection_containment
    required_tests:
      - tests/security/test_action_authority.py
      - tests/security/test_artifact_provenance.py
      - tests/security/test_prompt_injection_containment.py

  - file: 0005-tool-result-promotion-action-registry.patch
    owns:
      - agent/action_authority.py
      - agent/context_safety.py
      - agent/skill_commands.py
      - model_tools.py
      - run_agent.py
      - tests/security/test_action_authority.py
      - tests/security/test_tool_result_promotion.py
    surfaces:
      - registry_action_classification
      - unknown_side_effect_confirmation
      - derived_untrusted_action_taint
      - generic_tool_result_promotion_policy
    required_tests:
      - tests/security/test_action_authority.py
      - tests/security/test_tool_result_promotion.py
