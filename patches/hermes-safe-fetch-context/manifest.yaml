manifest_consistency:
  series_must_match_manifest_patch_order: true
  every_series_patch_must_exist: true
  every_patch_file_must_be_tracked: true
  verification_script_must_apply_clean_base: true
  every_manifest_owned_path_must_have_patch_diff_header: true
  base_ref_must_have_base: true
  tip_must_not_equal_base_when_series_nonempty: true
  tip_must_be_patched_commit_when_present: true
