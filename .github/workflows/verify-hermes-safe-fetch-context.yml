name: Verify Hermes safe-fetch/context patch stack

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 9 * * *'

jobs:
  verify-recorded-base:
    name: Verify recorded base
    runs-on: ubuntu-latest
    steps:
      - name: Check out patch stack
        uses: actions/checkout@v4

      - name: Check out Hermes upstream
        uses: actions/checkout@v4
        with:
          repository: NousResearch/hermes-agent
          path: hermes-agent
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Hermes test dependencies
        working-directory: hermes-agent
        run: python -m pip install -e ".[dev,messaging,cron,feishu]"

      - name: Run stack verifier at recorded base
        run: scripts/verify-hermes-safe-fetch-context-stack.sh hermes-agent

  verify-current-upstream:
    name: Verify current upstream main
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Check out patch stack
        uses: actions/checkout@v4

      - name: Check out Hermes upstream
        uses: actions/checkout@v4
        with:
          repository: NousResearch/hermes-agent
          path: hermes-agent
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Hermes test dependencies
        working-directory: hermes-agent
        run: python -m pip install -e ".[dev,messaging,cron,feishu]"

      - name: Run stack verifier at origin/main
        env:
          HERMES_BASE_REF: origin/main
        run: scripts/verify-hermes-safe-fetch-context-stack.sh hermes-agent
