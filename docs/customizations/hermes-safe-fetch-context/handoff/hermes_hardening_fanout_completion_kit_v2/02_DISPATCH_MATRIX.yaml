# Dispatch matrix

repo: macintog/hermes-hardening-stack
primary_goal: complete hostile-download prompt-injection containment and maintainer handoff safety
canonical_patch_dir: patches/hermes-safe-fetch-context
canonical_doc_dir: docs/customizations/hermes-safe-fetch-context
verification_script: scripts/verify-hermes-safe-fetch-context-stack.sh

expected_series:
  - 0001-context-safety-core.patch
  - 0002-safe-http-gateway-download-hardening.patch
  - 0003-customization-maintenance-tool.patch
  - 0004-provenance-action-authority-hardening.patch
  - 0005-tool-result-promotion-action-registry.patch

priority_order:
  p0:
    - docs_playbook_series_manifest_drift
    - preserve_0005_in_refresh_path
    - include_tool_result_promotion_tests
    - current_readme_five_phase_rewrite
  p1:
    - structured_turn_taint
    - tool_output_untrusted_by_default
    - tool_registry_metadata_fail_closed
    - browser_console_credentialed_context_reclassification
    - skill_inline_shell_gating_before_fencing
    - surface_map_patch_0005
  p2:
    - parser_extraction_caps
    - gateway_native_transcript_wrappers
    - plugin_injected_message_policy
    - verifier_doc_drift_checks
    - log_path_sanitization
    - ci_workflow

