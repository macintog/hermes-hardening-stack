reviews:
  - reviews/01_security_invariant_review.md
  - reviews/02_maintainer_handoff_review.md
  - reviews/03_verification_review.md

artifact_requirements:
  zip_must_include:
    - updated_repo_files_or_patch_bundle
    - subagent_reports
    - verifier_summary
    - risk_register
    - final_handoff_prompt
  final_answer_must_include:
    - current_commit_sha_reviewed
    - patch_series_after_changes
    - tests_run
    - residual_risks
    - path_to_zip
