    output: reports/repo_state_baseline.md
  - id: docs_playbook_sync
    prompt: subagents/02_docs_playbook_sync.md
    output: reports/docs_playbook_sync.md
  - id: structured_turn_taint
    prompt: subagents/03_structured_turn_taint.md
    output: reports/structured_turn_taint.md
  - id: registry_metadata
    prompt: subagents/04_tool_registry_metadata.md
    output: reports/registry_metadata.md
  - id: tool_result_promotion
    prompt: subagents/05_tool_result_promotion_default_untrusted.md
    output: reports/tool_result_promotion.md
  - id: browser_credentialed_context
    prompt: subagents/06_browser_credentialed_context.md
    output: reports/browser_credentialed_context.md
  - id: skill_plugin_execution_order
    prompt: subagents/07_skill_plugin_execution_order.md
    output: reports/skill_plugin_execution_order.md
  - id: persistence_memory_cron
